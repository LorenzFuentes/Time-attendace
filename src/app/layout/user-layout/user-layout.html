<nz-layout>
  <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed" [nzTrigger]="null">
    <div class="logo">
        <h1>InTime</h1>
    </div>
    <ul nz-menu nzTheme="dark" nzMode="inline">
        <li nz-menu-item (click)="getHome()">
          <nz-icon nzType="home" />
          <span>Home</span>
        </li>
        <li nz-menu-item (click)="getAnnouncement()">
          <nz-icon nzType="sound" />
          <span>Announcement</span>
        </li>
        <li nz-menu-item (click)="logout()">
          <nz-icon nzType="logout" />
          <span>Logout</span>
        </li>
    </ul>
  </nz-sider>
  <nz-layout>
    <nz-header class="main-header">
        <div class="header-content">
          <nz-icon
            class="trigger"
            [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"
            (click)="isCollapsed = !isCollapsed"
          />
          <div class="header-right">
            <span class="welcome-text">Welcome, {{ getDisplayName(currentUser) }}</span>
            <nz-avatar 
              [nzSize]="50" 
              [nzSrc]="getUserPhoto(currentUser) || undefined" 
              [nzText]="!getUserPhoto(currentUser) ? getInitials(currentUser) : ''" 
              [ngStyle]="{'background': !getUserPhoto(currentUser) ? '#a588be' : 'transparent'}"
            ></nz-avatar>
          </div>
        </div>
    </nz-header>

    <nz-content>
          <div class="router-outlet-container">
              <router-outlet></router-outlet>
          </div>
    </nz-content>

    <nz-footer>Lorenz Fuentes ©{{ date.getFullYear() }}</nz-footer>
  </nz-layout>
</nz-layout>
