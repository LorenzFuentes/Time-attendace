<!-- Mobile overlay -->
<div class="mobile-overlay" *ngIf="isMobileView" [class.show]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>

<nz-layout>
  <!-- Sidebar -->
  <nz-sider 
    nzCollapsible 
    [(nzCollapsed)]="isCollapsed" 
    [nzTrigger]="null"
    [class.mobile-show]="isMobileMenuOpen"
  >
    <div class="logo">
        <h1>InTime</h1>
    </div>
    
    <!-- Mobile close button -->
    <button *ngIf="isMobileView" class="mobile-close" (click)="closeMobileMenu()">✕</button>
    
    <ul nz-menu nzTheme="dark" nzMode="inline">
        <li nz-submenu nzTitle="User" nzIcon="user">
        <ul>
            <li nz-menu-item (click)="getHome()"><nz-icon nzType="dashboard"></nz-icon>&nbsp;&nbsp;Home</li>
            <li nz-menu-item (click)="logout()" style="color: #ff4d4f;"><nz-icon nzType="logout"></nz-icon>&nbsp;&nbsp;Logout</li>
        </ul>
        </li>
        <li nz-submenu nzTitle="Team" nzIcon="team">
        <ul>
            <li nz-menu-item (click)="getAdminTable()"><nz-icon nzType="team" nzTheme="outline" />&nbsp;&nbsp;Admin</li>
            <li nz-menu-item (click)="getEmployeeTable()"><nz-icon nzType="user" nzTheme="outline" />&nbsp;&nbsp;Employee</li>
            <li nz-menu-item (click)="getChart()"><nz-icon nzType="bar-chart" nzTheme="outline" />&nbsp;&nbsp;Chart</li>
        </ul>
        </li>
        <li nz-submenu nzTitle="Schedule" nzIcon="schedule">
        <ul>
            <li nz-menu-item (click)="getAnnouncement()"><nz-icon nzType="sound" nzTheme="outline" />&nbsp;&nbsp;Announcement</li>
            <li nz-menu-item (click)="getCalendar()"><nz-icon nzType="calendar" nzTheme="outline" />&nbsp;&nbsp;Calendar</li>
            <li nz-menu-item (click)="getAttendance()"><nz-icon nzType="check-circle" nzTheme="outline" />&nbsp;&nbsp;Attendance</li>
            <li nz-menu-item (click)="getLeave()"><nz-icon nzType="clock-circle" nzTheme="outline" />&nbsp;&nbsp;Leave</li>
        </ul>
        </li>
    </ul>
  </nz-sider>
  
  <nz-layout>
    <nz-header class="main-header">
        <div class="header-content">
          <!-- Updated trigger - works for both desktop and mobile -->
          <nz-icon
            class="trigger"
            [nzType]="isMobileView ? 'menu' : (isCollapsed ? 'menu-unfold' : 'menu-fold')"
            (click)="isMobileView ? toggleMobileMenu() : (isCollapsed = !isCollapsed)"
          />
          
         <div class="header-right">
            <!-- Hide welcome text on mobile -->
            <span class="welcome-text" *ngIf="!isMobileView">Welcome, {{ getDisplayName(currentUser) }}</span>
            <nz-avatar 
              [nzSize]="isMobileView ? 40 : 50" 
              [nzSrc]="getUserPhoto(currentUser) || undefined" 
              [nzText]="!getUserPhoto(currentUser) ? getInitials(currentUser) : ''" 
              [ngStyle]="{'background': !getUserPhoto(currentUser) ? '#a588be' : 'transparent'}"
            ></nz-avatar>
          </div>
        </div>
    </nz-header>

    <nz-content>
          <div class="router-outlet-container">
              <router-outlet></router-outlet>
          </div>
    </nz-content>

    <nz-footer>Lorenz Fuentes ©{{ date.getFullYear() }}</nz-footer>
  </nz-layout>
</nz-layout>
